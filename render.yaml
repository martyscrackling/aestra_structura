services:
  - type: web
    name: structura-backend
    env: python
    plan: free
    rootDir: backend/structura_backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && gunicorn structura_backend.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: structura_backend.settings
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      # Supabase (or any external Postgres): set DATABASE_URL in Render dashboard
      # e.g. postgres://USER:PASSWORD@HOST:5432/postgres?sslmode=require
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        value: https://structura-frontend-jc7s.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://martyscrackling.github.io,https://structura-frontend-jc7s.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://martyscrackling.github.io,https://structura-frontend-jc7s.onrender.com
      # Set in the Render dashboard to your web service's public base (no /api, no trailing slash), e.g.
      #   https://structura-backend-xxxx.onrender.com
      # Free web services have no persistent disk: uploads in MEDIA_ROOT are lost on restarts/idle.
      # With a paid web service, add a disk mounted at /var/data to match structura_backend.settings.
      - key: PUBLIC_BASE_URL
        sync: false

  - type: web
    name: structura-frontend
    env: docker
    plan: free
    dockerfilePath: Dockerfile.frontend
